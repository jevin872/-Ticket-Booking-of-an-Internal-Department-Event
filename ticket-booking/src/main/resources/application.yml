server:
  port: 8081
  servlet:
    context-path: /api
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: ticket-booking-system

  datasource:
    url: jdbc:h2:mem:ticket_booking_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: always

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noreply@ticketbooking.local}
    password: ${MAIL_PASSWORD:dummy}
    test-connection: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  cache:
    type: simple
    cache-names: events, tickets, users

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000        # 24 hours in ms
  refresh-expiration: 604800000  # 7 days in ms

# App Configuration
app:
  name: "TechFest Ticket Booking"
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  max-tickets-per-user: 5
  ticket-cancellation-hours: 24
  qr-code-size: 300
  upload-dir: ${UPLOAD_DIR:./uploads}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.ticketbooking: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/ticket-booking.log

# SpringDoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  info:
    title: Ticket Booking API
    version: 1.0.0
    description: Internal Department Event Ticket Booking System API
