<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 30px auto; background: #fff; border-radius: 8px; overflow: hidden; }
        .header { background: linear-gradient(135deg, #f7971e 0%, #ffd200 100%); color: white; padding: 30px; text-align: center; }
        .body { padding: 30px; color: #333; }
        .footer { background: #f8f8f8; padding: 20px; text-align: center; font-size: 12px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Booking Cancelled</h1>
        <p th:text="${appName}"></p>
    </div>
    <div class="body">
        <h2>Hello, <span th:text="${name}">User</span>!</h2>
        <p>Your booking <strong th:text="${booking.bookingReference}"></strong> for <strong th:text="${booking.event.title}"></strong> has been cancelled.</p>
        <p th:if="${booking.cancellationReason}">Reason: <span th:text="${booking.cancellationReason}"></span></p>
        <p>If you believe this is an error, please contact the event organizer.</p>
    </div>
    <div class="footer">
        <p th:text="${appName + ' | Internal Department Event System'}"></p>
    </div>
</div>
</body>
</html>
